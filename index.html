<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID de Emergencia — Sistema de Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * { font-family: 'Inter', system-ui, sans-serif; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

        /* Pulse animation for emergency */
        @keyframes emergency-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
        }
        .emergency-pulse { animation: emergency-pulse 2s infinite; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fade-in 0.35s ease-out; }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slide-up 0.4s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.5s ease-out; }

        /* QR container fix */
        #qr-display canvas, #qr-display img { margin: 0 auto; }
        #qr-display-pending canvas, #qr-display-pending img { margin: 0 auto; }
        #qr-emergency canvas, #qr-emergency img { margin: 0 auto; }

        /* Print styles */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }

        /* Photo upload area */
        .photo-upload {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
            cursor: pointer;
        }
        .photo-upload:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .photo-upload.has-photo {
            border: 2px solid #22c55e;
            background: #f0fdf4;
        }

        /* Modal backdrop */
        .modal-backdrop {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
        }

        /* Admin badge glow */
        .admin-glow {
            box-shadow: 0 0 12px rgba(234, 179, 8, 0.4);
        }

        /* Secure input */
        .secure-input:focus {
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
        }

        /* Premium Plan Badge styles */
        .plan-badge-basic { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .plan-badge-premium { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- ============================================== -->
    <!-- APP CONTAINER                                  -->
    <!-- ============================================== -->
    <div id="app" class="max-w-lg mx-auto min-h-screen relative shadow-2xl shadow-slate-200/50 bg-white"></div>
    <div id="modal-container"></div>

<script>
        const __app_id = "mi-id-emergencia-app"; // Puedes cambiar este nombre
        const __firebase_config = JSON.stringify({
          apiKey: "AIzaSyByrqYE6be-wlGbKgIU_SuDyLiHtoUg1Y4",
          authDomain: "id-emergencias.firebaseapp.com",
          projectId: "id-emergencias",
          storageBucket: "id-emergencias.firebasestorage.app",
          messagingSenderId: "51228672702",
          appId: "1:51228672702:web:a733281f7cc89336d014ef"
        });
    </script>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ====================================================
    // GLOBAL APP STATE & FIREBASE
    // ====================================================
    let currentActiveView = 'init';
    let isFirstLoad = true;
    let isFirebaseEnabled = false;
    let db, auth, profilesCollectionRef;

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'emergency-id-default';
    const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
    const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    // ====================================================
    // SAFE STORAGE (Local configs)
    // ====================================================
    const safeStorage = {
        getLocal(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
        setLocal(key, value) { try { localStorage.setItem(key, value); } catch(e) {} },
        removeLocal(key) { try { localStorage.removeItem(key); } catch(e) {} },
        getSession(key) { try { return sessionStorage.getItem(key); } catch(e) { return null; } },
        setSession(key, value) { try { sessionStorage.setItem(key, value); } catch(e) {} },
        removeSession(key) { try { sessionStorage.removeItem(key); } catch(e) {} }
    };

    const APP_KEY = 'emergencyID_v3';
    const ADMIN_KEY = 'emergencyID_admin';
    const SESSION_KEY = 'emergencyID_session';
    const USER_FILLED_KEY = 'emergencyID_filled';

    // ====================================================
    // STATE MANAGEMENT (Syncs with Firebase)
    // ====================================================
    const State = {
        profiles: [],
        activeProfileIndex: 0,
        isAdminLoggedIn: false,

        loadLocalAuth() {
            const session = safeStorage.getSession(SESSION_KEY);
            this.isAdminLoggedIn = session === 'authenticated';
        },

        loadLocalData() {
            try {
                const raw = safeStorage.getLocal(APP_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    this.profiles = data.profiles || [];
                    this.activeProfileIndex = data.activeProfileIndex || 0;
                }
            } catch(e) { this.profiles = []; }
        },

        saveLocalData() {
            safeStorage.setLocal(APP_KEY, JSON.stringify({
                profiles: this.profiles,
                activeProfileIndex: this.activeProfileIndex
            }));
        },

        hasProfiles() { return this.profiles.length > 0; },
        getActive() { return this.profiles[this.activeProfileIndex] || null; },
        getProfileById(id) { return this.profiles.find(p => p.id === id); },
        getProfileIndexById(id) { return this.profiles.findIndex(p => p.id === id); },

        async addProfile(profile, keepId = false) {
            if (!keepId || !profile.id) {
                profile.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
            }
            profile.createdAt = new Date().toISOString();
            if (!profile.status) profile.status = 'active';
            if (!profile.plan) profile.plan = 'premium'; // Default to premium if not specified

            // Optimistic update
            this.profiles.push(profile);
            this.activeProfileIndex = this.profiles.length - 1;

            if (isFirebaseEnabled) {
                try { await setDoc(doc(profilesCollectionRef, profile.id), profile); } 
                catch(e) { console.error("Error guardando en la nube:", e); }
            } else {
                this.saveLocalData();
            }
            return profile;
        },

        async generateEmptyProfile(planType = 'premium') {
            const profile = {
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
                name: 'Código Vacío',
                status: 'pending',
                type: 'person',
                plan: planType // 'basic' o 'premium'
            };
            await this.addProfile(profile, true);
        },

        async updateProfile(index, data) {
            if (this.profiles[index]) {
                const updatedProfile = { ...this.profiles[index], ...data, updatedAt: new Date().toISOString() };
                this.profiles[index] = updatedProfile;

                if (isFirebaseEnabled) {
                    try { await setDoc(doc(profilesCollectionRef, updatedProfile.id), updatedProfile, { merge: true }); }
                    catch(e) { console.error("Error actualizando en la nube:", e); }
                } else {
                    this.saveLocalData();
                }
            }
        },

        async deleteProfile(index) {
            const profile = this.profiles[index];
            if (!profile) return;
            
            this.profiles.splice(index, 1);
            if (this.activeProfileIndex >= this.profiles.length) {
                this.activeProfileIndex = Math.max(0, this.profiles.length - 1);
            }

            if (isFirebaseEnabled) {
                try { await deleteDoc(doc(profilesCollectionRef, profile.id)); }
                catch(e) { console.error("Error eliminando en la nube:", e); }
            } else {
                this.saveLocalData();
            }
        }
    };

    // ====================================================
    // ADMIN AUTHENTICATION SYSTEM
    // ====================================================
    const AdminAuth = {
        async hashPassword(password) {
            if (!window.crypto || !window.crypto.subtle) {
                let hash = 0;
                const str = password + '_emergency_salt_2024';
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return hash.toString(16);
            }
            const encoder = new TextEncoder();
            const data = encoder.encode(password + '_emergency_salt_2024');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        },

        async setPassword(password) {
            const hash = await this.hashPassword(password);
            safeStorage.setLocal(ADMIN_KEY, hash);
            return true;
        },

        async verifyPassword(password) {
            const storedHash = safeStorage.getLocal(ADMIN_KEY);
            if (!storedHash) return false;
            const hash = await this.hashPassword(password);
            return hash === storedHash;
        },

        hasPassword() {
            return safeStorage.getLocal(ADMIN_KEY) !== null;
        },

        login() {
            safeStorage.setSession(SESSION_KEY, 'authenticated');
            State.isAdminLoggedIn = true;
        },

        logout() {
            safeStorage.removeSession(SESSION_KEY);
            State.isAdminLoggedIn = false;
        },

        isLoggedIn() {
            return State.isAdminLoggedIn;
        },

        async changePassword(currentPass, newPass) {
            const isValid = await this.verifyPassword(currentPass);
            if (!isValid) return { success: false, error: 'Contraseña actual incorrecta' };
            await this.setPassword(newPass);
            return { success: true };
        },

        resetPassword() {
            safeStorage.removeLocal(ADMIN_KEY);
            this.logout();
        }
    };

    // ====================================================
    // ROUTER & INITIALIZATION
    // ====================================================
    function getRoute() {
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view');
        const id = params.get('id');
        const data = params.get('data');
        if (view === 'emergency' && (id || data)) return { view: 'emergency', id, data };
        if (view === 'setup' && id) return { view: 'setup', id };
        return { view: 'app' };
    }

    async function initFirebase() {
        if (firebaseConfigStr) {
            try {
                const config = JSON.parse(firebaseConfigStr);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                profilesCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                isFirebaseEnabled = true;

                if (customToken) {
                    await signInWithCustomToken(auth, customToken);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (!user) return;
                    
                    onSnapshot(profilesCollectionRef, (snapshot) => {
                        State.profiles = [];
                        snapshot.forEach(doc => State.profiles.push(doc.data()));
                        
                        if (isFirstLoad) {
                            isFirstLoad = false;
                            handleInitialRoute();
                        } else {
                            if (currentActiveView === 'dashboard') renderDashboard();
                            else if (currentActiveView === 'admin') renderAdminPanel(document.getElementById('search-input')?.value || '');
                            else if (currentActiveView === 'welcome' && State.hasProfiles()) renderDashboard();
                        }
                    }, (error) => {
                        console.error("Error syncing with Firestore:", error);
                        fallbackToLocal();
                    });
                });

            } catch (err) {
                console.error("Fallo la inicialización de Firebase:", err);
                fallbackToLocal();
            }
        } else {
            fallbackToLocal();
        }
    }

    function fallbackToLocal() {
        isFirebaseEnabled = false;
        State.loadLocalData();
        if (isFirstLoad) {
            isFirstLoad = false;
            handleInitialRoute();
        }
    }

    function handleInitialRoute() {
        const route = getRoute();
        const userHasFilled = safeStorage.getLocal(USER_FILLED_KEY) === 'true';

        if (route.view === 'emergency') {
            renderEmergencyView(route.id, route.data);
        } else if (route.view === 'setup') {
    const existing = State.getProfileById(route.id);
    // Si el QR ya tiene dueño, se muestra. Si está pendiente, siempre permite llenarlo.
    if (existing && existing.status !== 'pending') {
        renderEmergencyView(route.id);
    } else {
        renderRegistration(null, route.id);
    }
} else if (userHasFilled && !AdminAuth.isLoggedIn()) {
            const active = State.getActive();
            if (active) renderEmergencyView(active.id);
            else renderWelcome();
        } else if (State.hasProfiles()) {
            renderDashboard();
        } else {
            renderWelcome();
        }
    }

    // ====================================================
    // UI: ADMIN LOGIN MODAL
    // ====================================================
    function showLoginModal(onSuccess, mode = 'login') {
        const modalContainer = document.getElementById('modal-container');
        const isSetup = mode === 'setup';
        
        modalContainer.innerHTML = `
            <div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4 fade-in" id="login-modal">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden slide-up">
                    <div class="bg-gradient-to-r from-amber-500 to-yellow-500 p-5 text-white text-center">
                        <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i data-lucide="${isSetup ? 'shield-plus' : 'lock'}" class="w-8 h-8"></i>
                        </div>
                        <h2 class="text-xl font-bold">${isSetup ? 'Crear Contraseña Admin' : 'Acceso Administrativo'}</h2>
                        <p class="text-amber-100 text-sm mt-1">${isSetup ? 'Protege el acceso a la gestión de datos' : 'Ingresa tu contraseña para continuar'}</p>
                    </div>
                    <div class="p-5">
                        <form id="login-form" class="space-y-4">
                            ${isSetup ? `
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">Nueva contraseña</label>
                                <div class="relative">
                                    <input type="password" id="admin-pass" required minlength="4"
                                        class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-300 secure-input outline-none transition-all text-slate-800"
                                        placeholder="Mínimo 4 caracteres">
                                    <button type="button" onclick="togglePassVisibility('admin-pass')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <i data-lucide="eye" class="w-5 h-5" id="eye-admin-pass"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">Confirmar contraseña</label>
                                <div class="relative">
                                    <input type="password" id="admin-pass-confirm" required minlength="4"
                                        class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-300 secure-input outline-none transition-all text-slate-800"
                                        placeholder="Repite la contraseña">
                                    <button type="button" onclick="togglePassVisibility('admin-pass-confirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <i data-lucide="eye" class="w-5 h-5" id="eye-admin-pass-confirm"></i>
                                    </button>
                                </div>
                            </div>
                            ` : `
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">Contraseña</label>
                                <div class="relative">
                                    <input type="password" id="admin-pass" required autofocus
                                        class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-300 secure-input outline-none transition-all text-slate-800"
                                        placeholder="Ingresa tu contraseña">
                                    <button type="button" onclick="togglePassVisibility('admin-pass')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <i data-lucide="eye" class="w-5 h-5" id="eye-admin-pass"></i>
                                    </button>
                                </div>
                            </div>
                            `}
                            <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-xl"></div>
                            <button type="submit"
                                class="w-full bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all flex items-center justify-center gap-2">
                                <i data-lucide="${isSetup ? 'shield-check' : 'unlock'}" class="w-5 h-5"></i>
                                ${isSetup ? 'Crear Contraseña' : 'Ingresar'}
                            </button>
                        </form>
                        <button onclick="closeLoginModal()" class="w-full mt-3 text-slate-400 hover:text-slate-600 text-sm font-medium py-2 transition-colors">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            const pass = document.getElementById('admin-pass').value;

            if (isSetup) {
                const passConfirm = document.getElementById('admin-pass-confirm').value;
                if (pass !== passConfirm) {
                    errorEl.textContent = 'Las contraseñas no coinciden';
                    errorEl.classList.remove('hidden');
                    document.getElementById('login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 500);
                    return;
                }
                if (pass.length < 4) {
                    errorEl.textContent = 'La contraseña debe tener al menos 4 caracteres';
                    errorEl.classList.remove('hidden');
                    return;
                }
                await AdminAuth.setPassword(pass);
                AdminAuth.login();
                closeLoginModal();
                showToast('Contraseña creada exitosamente', 'success');
                if (onSuccess) onSuccess();
            } else {
                const isValid = await AdminAuth.verifyPassword(pass);
                if (isValid) {
                    AdminAuth.login();
                    closeLoginModal();
                    showToast('Acceso concedido', 'success');
                    if (onSuccess) onSuccess();
                } else {
                    errorEl.textContent = 'Contraseña incorrecta';
                    errorEl.classList.remove('hidden');
                    document.getElementById('login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 500);
                }
            }
        };
    }

    function closeLoginModal() {
        const modalContainer = document.getElementById('modal-container');
        modalContainer.innerHTML = '';
    }

    function togglePassVisibility(inputId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById('eye-' + inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    function requireAdmin(callback) {
        if (AdminAuth.isLoggedIn()) {
            callback();
        } else if (!AdminAuth.hasPassword()) {
            showLoginModal(callback, 'setup');
        } else {
            showLoginModal(callback, 'login');
        }
    }

    // ====================================================
    // UI: EMERGENCY VIEW (WITH BASIC/PREMIUM LOGIC)
    // ====================================================
    function decodeProfileFromQR(data) {
        try {
            const json = decodeURIComponent(escape(atob(data)));
            const parsed = JSON.parse(json);
            if (!parsed || !parsed.name || !parsed.phone) return null;
            return parsed;
        } catch (e) {
            console.error("Error decoding QR data:", e);
            return null;
        }
    }

    function renderEmergencyView(profileId, qrData) {
        currentActiveView = 'emergency';
        let profile = null;
        if (profileId) profile = State.profiles.find(p => p.id === profileId);
        if (!profile && qrData) profile = decodeProfileFromQR(qrData);
        
        const app = document.getElementById('app');

        if (!profile || profile.status === 'pending') {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-red-50 p-6">
                    <div class="text-center fade-in">
                        <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="alert-triangle" class="w-10 h-10 text-red-600"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-red-800 mb-2">Perfil no encontrado</h1>
                        <p class="text-red-600">El código QR puede estar vacío o el perfil fue eliminado.</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        const isPet = profile.type === 'pet';
        const isPremium = profile.plan !== 'basic'; // Por defecto es premium para perfiles antiguos
        const typeLabel = isPet ? 'Mascota' : 'Persona';
        const typeIcon = isPet ? 'paw-print' : 'user';
        
        // La foto solo se muestra si es Premium. Si es Básico, mostramos un ícono genérico.
        const photoHTML = (isPremium && profile.photo)
            ? `<img src="${profile.photo}" alt="Foto" class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg">`
            : `<div class="w-28 h-28 rounded-full bg-white/20 flex items-center justify-center border-4 border-white/40">
                 <i data-lucide="${typeIcon}" class="w-14 h-14 text-white/80"></i>
               </div>`;

        // Solo renderizar bloques Premium si el plan no es básico
        const medicalHTML = (isPremium && profile.medicalNotes) ? `
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 slide-up" style="animation-delay: 0.2s">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="heart-pulse" class="w-5 h-5 text-amber-600"></i>
                    <h3 class="font-bold text-amber-800">Información Médica</h3>
                </div>
                <p class="text-amber-900 text-sm leading-relaxed">${escapeHTML(profile.medicalNotes)}</p>
            </div>` : '';

        const addressHTML = (isPremium && profile.address) ? `
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 slide-up" style="animation-delay: 0.25s">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="map-pin" class="w-5 h-5 text-blue-600"></i>
                    <h3 class="font-bold text-blue-800">Dirección</h3>
                </div>
                <p class="text-blue-900 text-sm">${escapeHTML(profile.address)}</p>
            </div>` : '';

        const petOwnerHTML = (isPet && profile.ownerName) ? `
            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 slide-up" style="animation-delay: 0.15s">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="user" class="w-5 h-5 text-slate-600"></i>
                    <h3 class="font-bold text-slate-800">Dueño/a</h3>
                </div>
                <p class="text-slate-900 font-medium">${escapeHTML(profile.ownerName)}</p>
            </div>` : '';

        const petDetailsHTML = (isPremium && isPet) ? `
            ${profile.breed ? `<div class="flex justify-between py-2 border-b border-slate-100">

    // ====================================================

                                value="${(isEdit || isSetup) && profile?.phoneAlt ? escapeHTML(profile.phoneAlt) : ''}">
                        </div>

                        <!-- Bloques PREMIUM de Mascotas -->
                        <div id="pet-fields" class="hidden space-y-5 premium-feature">

                            <div>

    function selectPlan(plan) {
        window._selectedPlan = plan;
        const btnBasic = document.getElementById('btn-plan-basic');
        const btnPremium = document.getElementById('btn-plan-premium');
        const desc = document.getElementById('plan-desc');
        
        if (btnBasic && btnPremium) {
            if (plan === 'basic') {
                btnBasic.className = 'py-2.5 rounded-lg text-sm font-bold transition-all bg-white text-indigo-700 shadow-sm';
                btnPremium.className = 'py-2.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 text-slate-500 hover:text-slate-700';
                if(desc) desc.textContent = 'Solo información de contacto de emergencia.';
            } else {
                btnBasic.className = 'py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:text-slate-700';
                btnPremium.className = 'py-2.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 bg-white text-amber-600 shadow-sm';
                if(desc) desc.textContent = 'Incluye datos médicos, dirección y fotos.';
            }
        }

        // Mostrar/Ocultar campos premium
        document.querySelectorAll('.premium-feature').forEach(el => {
            if (plan === 'basic') {
                el.classList.add('hidden');
            } else {
                // Remove hidden solo si no está en un contenedor oculto padre
                // Para pet-fields/person-fields la visibilidad se maneja en selectType, 
                // así que solo quitamos hidden si corresponde
                el.classList.remove('hidden');
            }
        });
        
        // Re-aplicar visibilidad de tipo (person/pet) por si algún contenedor premium se sobreescribió
        selectType(window._selectedType);
    }

    function selectType(type) {
        window._selectedType = type;
        const btnPerson = document.getElementById('btn-person');
        const btnPet = document.getElementById('btn-pet');
        const petFields = document.getElementById('pet-fields');
        const personFields = document.getElementById('person-fields');
        const ownerField = document.getElementById('owner-field');

        if (!btnPerson || !btnPet) return;

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.remove('border-blue-500', 'bg-blue-50');
            btn.classList.add('border-slate-200', 'bg-white');
        });

        if (type === 'person') {
            btnPerson.classList.add('border-blue-500', 'bg-blue-50');
            btnPerson.classList.remove('border-slate-200', 'bg-white');
            if(window._selectedPlan === 'premium') personFields.classList.remove('hidden');
            else personFields.classList.add('hidden');
            petFields.classList.add('hidden');
            ownerField.classList.add('hidden');
        } else {

    function handlePhoto(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 300;
                let w = img.width, h = img.height;
                if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                window._currentPhoto = canvas.toDataURL('image/jpeg', 0.7);

                const photoArea = document.getElementById('photo-preview-area');
                const photoContainer = document.getElementById('photo-area');
                photoArea.innerHTML = `<img src="${window._currentPhoto}" class="w-20 h-20 rounded-full object-cover mx-auto">
                    <p class="text-xs text-green-600 font-medium mt-2">Toca para cambiar</p>`;
                photoContainer.classList.add('has-photo');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function handleSubmit(e, editIndex, assignId = null) {
        e.preventDefault();
        
        const btnSubmit = document.getElementById('btn-submit-form');
        btnSubmit.disabled = true;
        const originalText = btnSubmit.innerHTML;
        btnSubmit.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Guardando...`;
        lucide.createIcons();

        // Recolectar datos. Si es plan básico, ignoramos los campos premium
        const data = {
            type: window._selectedType,
            plan: window._selectedPlan,
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            phoneAlt: document.getElementById('phoneAlt').value.trim()
        };

        if (window._selectedType === 'pet') {
            data.ownerName = document.getElementById('ownerName').value.trim();
        }

        // Agregar campos premium solo si el plan es premium
        if (window._selectedPlan === 'premium') {
            data.address = document.getElementById('address').value.trim();
            data.medicalNotes = document.getElementById('medicalNotes').value.trim();
            data.allergies = document.getElementById('allergies').value.trim();
            data.photo = window._currentPhoto || null;
            
            if (window._selectedType === 'pet') {
                data.breed = document.getElementById('breed').value.trim();
                data.color = document.getElementById('color').value.trim();
                data.weight = document.getElementById('weight').value.trim();
            } else {
                data.bloodType = document.getElementById('bloodType').value;
            }
        }

        if (!data.name || !data.phone || (data.type === 'pet' && !data.ownerName)) {
            showToast('Completa los campos obligatorios', 'error');
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = originalText;
            return;
        }

        let savedProfileId = null;

        if (editIndex !== null) {
            await State.updateProfile(editIndex, { ...data, status: 'active' });
            savedProfileId = State.profiles[editIndex].id;
        } else {
            if (assignId) {
                const existingIndex = State.getProfileIndexById(assignId);
                if (existingIndex >= 0) {
                    await State.updateProfile(existingIndex, { ...data, status: 'active' });
                    savedProfileId = assignId;
                } else {
                    data.id = assignId;
                    data.status = 'active';
                    await State.addProfile(data, true);
                    savedProfileId = assignId;
                }
            } else {
                data.status = 'active';
                const newProfile = await State.addProfile(data);
                savedProfileId = newProfile.id;
            }
        }

        window._currentPhoto = null;

        if (assignId) {
            safeStorage.setLocal(USER_FILLED_KEY, 'true');
        }

        if (!AdminAuth.isLoggedIn() && assignId) {
            renderEmergencyView(savedProfileId);
            showToast('Ficha activada de manera segura', 'success');
        } else {
            renderDashboard();
            showToast(editIndex !== null ? 'Perfil actualizado' : 'Ficha creada exitosamente', 'success');
        }
    }

                safeStorage.removeLocal(APP_KEY);
                safeStorage.removeLocal(ADMIN_KEY);

    function exportData() {
        const data = { version: '2.1', exportedAt: new Date().toISOString(), profiles: State.profiles };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ID-Emergencia-Backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Datos exportados', 'success');
    }

    function confirmImportData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!data.profiles || !Array.isArray(data.profiles)) throw new Error('Formato inválido');

                if (confirm(`Se encontraron ${data.profiles.length} perfiles.\n\n¿Deseas importarlos a la base de datos?`)) {
                    showToast('Importando...', 'info');
                    for (const newProfile of data.profiles) {
                        // Asegurar compatibilidad para datos viejos
                        if (!newProfile.plan) newProfile.plan = 'premium';
                        
                        if (isFirebaseEnabled) {
                            await setDoc(doc(profilesCollectionRef, newProfile.id), newProfile, {merge: true});
                        } else {
                            const existingIndex = State.profiles.findIndex(p => p.id === newProfile.id);
                            if (existingIndex >= 0) State.profiles[existingIndex] = newProfile;
                            else State.profiles.push(newProfile);
                        }
                    }
                    if (!isFirebaseEnabled) {
                        State.saveLocalData();
                        renderAdminPanel();
                    }
                    showToast(`${data.profiles.length} perfiles importados`, 'success');
                }
            } catch (err) {
                showToast('Error al importar: archivo inválido', 'error');
            }
        };
        input.click();
    }

    function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function buildEmergencyURL(profileId) {
        const base = window.location.origin + window.location.pathname;
        return `${base}?view=emergency&id=${profileId}`;
    }

    function buildSetupURL(profileId) {
        const base = window.location.origin + window.location.pathname;
        return `${base}?view=setup&id=${profileId}`;
    }

    function buildEmergencyURLWithData(profile) {
        const base = window.location.origin + window.location.pathname;
        // Solo codificar datos relevantes según el plan
        const payload = {
            id: profile.id, 
            type: profile.type, 
            plan: profile.plan || 'premium',
            name: profile.name, 
            phone: profile.phone, 
            phoneAlt: profile.phoneAlt || ''
        };
        
        if (payload.plan === 'premium') {
            if (profile.type === 'pet') {
                payload.ownerName = profile.ownerName || '';
                payload.breed = profile.breed || '';
                payload.color = profile.color || '';
                payload.weight = profile.weight || '';
            } else {
                payload.bloodType = profile.bloodType || '';
            }
            payload.allergies = profile.allergies || '';
            payload.medicalNotes = profile.medicalNotes || '';
            payload.address = profile.address || '';
            payload.photo = profile.photo || '';
        } else if (profile.type === 'pet') {
             payload.ownerName = profile.ownerName || ''; // Mínimo para mascota básica
        }

        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
        return `${base}?view=emergency&data=${encoded}`;
    }

    function setQRMode(mode) {
        const profile = State.getActive();
        if (!profile) return;
        const portableURL = buildEmergencyURLWithData(profile);
        const localURL = buildEmergencyURL(profile.id);
        const url = mode === 'local' ? localURL : portableURL;

        const btnPortable = document.getElementById('qr-mode-portable');
        const btnLocal = document.getElementById('qr-mode-local');
        const urlDisplay = document.getElementById('qr-url-display');
        if (btnPortable && btnLocal) {
            btnPortable.className = 'qr-mode-btn text-xs font-bold py-2 rounded-lg ' + (mode === 'portable' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-700');
            btnLocal.className = 'qr-mode-btn text-xs font-bold py-2 rounded-lg ' + (mode === 'local' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-700');
        }
        if (urlDisplay) urlDisplay.textContent = url;
        updateQRCode(portableURL, localURL, mode);
    }

    function updateQRCode(portableURL, localURL, mode = 'portable') {
        const qrContainer = document.getElementById('qr-display');
        if (qrContainer) {
            qrContainer.innerHTML = '';
            const url = mode === 'local' ? localURL : portableURL;
            new QRCode(qrContainer, { text: url, width: 200, height: 200, colorDark: '#1e293b', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
        }
    }

    function showToast(message, type = 'info') {
        const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-slate-700' };
        const icons = { success: 'check-circle', error: 'alert-circle', info: 'info' };

        const toast = document.createElement('div');
        toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] ${colors[type]} text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 text-sm font-medium slide-up`;
        toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5"></i> <span class="whitespace-nowrap">${message}</span>`;
        document.body.appendChild(toast);
        lucide.createIcons();

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function shareLocation(phone, name) {
        if (!navigator.geolocation) return showToast('Tu navegador no soporta geolocalización', 'error');
        showToast('Obteniendo tu ubicación actual...', 'info');

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                const message = `🚨 *EMERGENCIA* 🚨\nHola, he escaneado la placa de emergencia de *${name}* y necesita ayuda.\n\n📍 Aquí está nuestra ubicación actual:\n${mapsUrl}`;
                const cleanPhone = phone.replace(/[^0-9+]/g, '');
                window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`, '_blank');
                showToast('Abriendo WhatsApp...', 'success');
            },
            (error) => {
                console.error(error.message || error);
                showToast(error.code === 1 ? 'Permiso de ubicación denegado.' : 'Error al obtener la ubicación', 'error');
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

                    <button onclick="renderRegistration()" class="w-full max-w-xs bg-blue-700 hover:bg-blue-800 active:bg-blue-900 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-lg shadow-blue-700/25 flex items-center justify-center gap-2 mx-auto">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> Crear Primera Ficha
                    </button>
                    <p class="text-xs text-slate-400 mt-6"><i data-lucide="cloud" class="w-3 h-3 inline"></i> Sincronización en la nube lista</p>
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    // Attach to Window
    window.togglePassVisibility = togglePassVisibility;
    window.closeLoginModal = closeLoginModal;
    window.requireAdmin = requireAdmin;
    window.renderDashboard = renderDashboard;
    window.handleGenerateEmpty = handleGenerateEmpty;
    window.renderAdminPanel = renderAdminPanel;
    window.renderRegistration = renderRegistration;
    window.handleLogout = handleLogout;
    window.showAdminSettings = showAdminSettings;
    window.exportData = exportData;
    window.confirmImportData = confirmImportData;
    window.handleSearch = handleSearch;
    window.previewEmergencyFromAdmin = previewEmergencyFromAdmin;
    window.editProfileFromAdmin = editProfileFromAdmin;
    window.deleteProfileFromAdmin = deleteProfileFromAdmin;
    window.confirmResetPassword = confirmResetPassword;
    window.confirmDeleteAllData = confirmDeleteAllData;
    window.selectPlan = selectPlan;
    window.selectType = selectType;
    window.handlePhoto = handlePhoto;
    window.handleSubmit = handleSubmit;
    window.backToDashboardOrEmergency = backToDashboardOrEmergency;
    window.switchProfile = switchProfile;
    window.handleEditProfile = handleEditProfile;
    window.handleDeleteProfile = handleDeleteProfile;
    window.setQRMode = setQRMode;
    window.downloadQR = downloadQR;
    window.downloadQRPending = downloadQRPending;
    window.printQR = printQR;
    window.previewEmergency = previewEmergency;
    window.shareLocation = shareLocation;

    const GLOBAL_ACCESS_CODE = "1973";
    const GLOBAL_ACCESS_KEY = "emergencyID_global_access";

    function renderAppAccess() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm fade-in text-center border border-slate-100">
                    <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-100">
                        <i data-lucide="lock" class="w-8 h-8 text-blue-600"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">Acceso a la App</h2>
                    <p class="text-slate-500 text-sm mb-6">Ingresa el código de acceso general para continuar.</p>
                    
                    <form id="app-access-form" class="space-y-4">
                        <input type="password" id="app-access-input" required autofocus
                            class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-center text-xl tracking-widest text-slate-800"
                            placeholder="****">
                        <div id="app-access-error" class="hidden text-red-500 text-sm font-medium bg-red-50 p-2 rounded-lg">Código incorrecto</div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-xl transition-all shadow shadow-blue-600/20">
                            Ingresar
                        </button>
                        <p class="text-xs text-slate-400 mt-2">Administrador / Usuario</p>
                    </form>
                </div>
            </div>
        `;
        lucide.createIcons();

        document.getElementById('app-access-form').onsubmit = (e) => {
            e.preventDefault();
            const code = document.getElementById('app-access-input').value;
            if (code === GLOBAL_ACCESS_CODE) {
                safeStorage.setLocal(GLOBAL_ACCESS_KEY, 'true');
                startApp();
            } else {
                const errorEl = document.getElementById('app-access-error');
                errorEl.classList.remove('hidden');
                const form = document.getElementById('app-access-form');
                form.classList.add('shake');
                setTimeout(() => form.classList.remove('shake'), 500);
            }
        };
    }

    function startApp() {
        State.loadLocalAuth();
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4 shadow"></div>
                <p class="text-slate-500 font-medium fade-in">Conectando...</p>
            </div>
        `;

        initFirebase();
    }

    function init() {
        // 1. Obtenemos la ruta actual para saber qué está intentando ver el usuario
        const route = getRoute();

        // 2. Si viene de escanear un QR (para ver una emergencia o configurar un código vacío)
        // le damos acceso directo a la aplicación sin pedir el PIN global.
        if (route.view === 'emergency' || route.view === 'setup') {
            startApp();
        } 
        // 3. Si entra a la página principal, verificamos si ya había puesto el PIN antes
        else if (safeStorage.getLocal(GLOBAL_ACCESS_KEY) === 'true') {
            startApp();
        } 
        // 4. Si entra a la página principal y no tiene el PIN guardado, bloqueamos la pantalla
        else {
            renderAppAccess();
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
</body>
</html>
