<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID de Emergencia — Sistema de Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * { font-family: 'Inter', system-ui, sans-serif; }

        /* Custom scrollbar */

        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-track { background: #f1f5f9; }

        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

        /* Pulse animation for emergency */

        @keyframes emergency-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
        }

        .emergency-pulse { animation: emergency-pulse 2s infinite; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fade-in 0.35s ease-out; }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up { animation: slide-up 0.4s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake { animation: shake 0.5s ease-out; }

        /* QR container fix */

        #qr-display canvas, #qr-display img { margin: 0 auto; }

        #qr-display-pending canvas, #qr-display-pending img { margin: 0 auto; }

        #qr-emergency canvas, #qr-emergency img { margin: 0 auto; }

        /* Print styles */

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }

        /* Photo upload area */

        .photo-upload {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
            cursor: pointer;
        }

        .photo-upload:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .photo-upload.has-photo {
            border: 2px solid #22c55e;
            background: #f0fdf4;
        }

        /* Modal backdrop */

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
        }

        /* Admin badge glow */

        .admin-glow {
            box-shadow: 0 0 12px rgba(234, 179, 8, 0.4);
        }

        /* Secure input */

        .secure-input:focus {
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
        }

        /* Premium Plan Badge styles */

        .plan-badge-basic { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

        .plan-badge-premium { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    </style>
